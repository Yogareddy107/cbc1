<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7D29;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E65100;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- GitHub Repository Icon (The Book) -->
  <path 
    d="M60 40h60c11 0 20 9 20 20v100c0 5.5-4.5 10-10 10H60c-11 0-20-9-20-20V60c0-11 9-20 20-20z" 
    fill="none" 
    stroke="#1A1A1A" 
    stroke-width="12" 
    stroke-linejoin="round"
  />
  <path 
    d="M140 150H60c-5.5 0-10 4.5-10 10" 
    fill="none" 
    stroke="#1A1A1A" 
    stroke-width="12" 
    stroke-linecap="round"
  />
  
  <!-- Analysis & Verification Symbol -->
  <g transform="translate(10, 10)">
    <!-- Magnifying Glass / Analysis Circle -->
    <circle 
      cx="115" 
      cy="85" 
      r="45" 
      fill="white" 
      stroke="url(#primaryGrad)" 
      stroke-width="12" 
      shadow="0 4px 6px rgba(0,0,0,0.1)"
    />
    
    <!-- Verification Checkmark -->
    <path 
      d="M98 85l12 12 25-25" 
      fill="none" 
      stroke="url(#primaryGrad)" 
      stroke-width="12" 
      stroke-linecap="round" 
      stroke-linejoin="round"
    />
    
    <!-- Handle -->
    <path 
      d="M145 115l15 15" 
      stroke="url(#primaryGrad)" 
      stroke-width="12" 
      stroke-linecap="round"
    />
